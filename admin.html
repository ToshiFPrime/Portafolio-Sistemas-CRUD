<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Trabajos - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Panel de Gestión de Servicios</h1>
        <nav>
            <ul>
                <li><a href="index.html">⬅ Volver al Portafolio</a></li>
            </ul>
        </nav>
        <button id="toggle-mode">Activar Modo Oscuro</button>
    </header>

    <main>
        <section>
            <h2>Registrar Nueva Orden de Trabajo</h2>
            <form id="crudForm">
                <label>Cliente (Texto):</label>
                <input type="text" id="crud-cliente" placeholder="Nombre del cliente">

                <label>Presupuesto $ (Numérico):</label>
                <input type="number" id="crud-costo" placeholder="0.00">

                <label>Fecha de Entrega (Fecha):</label>
                <input type="date" id="crud-fecha">

                <label>Tipo de Servicio (Selección):</label>
                <select id="crud-servicio">
                    <option value="">-- Seleccione --</option>
                    <option value="Mantenimiento">Mantenimiento</option>
                    <option value="Redes">Redes</option>
                    <option value="Software">Software</option>
                </select>

                <div class="checkbox-container">
                    <input type="checkbox" id="crud-urgente">
                    <label>¿Es pedido Urgente? (Checkbox)</label>
                </div>

                <p id="error-crud" class="error-texto">⚠️ Error: Todos los campos son obligatorios para el registro.</p>
                <button type="submit">Guardar Registro en Tabla</button>
            </form>

            <h3>Lista de Trabajos Activos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Costo</th>
                        <th>Fecha</th>
                        <th>Servicio</th>
                        <th>Urgente</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
